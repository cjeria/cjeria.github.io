<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <!-- Tells the browser to redirect immediately (0 seconds) to the target URL -->
    <meta http-equiv="refresh" content="0; url=https://christianjeria.work">
    <!-- Helps search engines know the original source has moved -->
    <link rel="canonical" href="https://christianjeria.work">
  </head>
  <body>
    <p>If you are not redirected automatically, follow this <a href="https://christianjeria.work">link to the new site</a>.</p>
  </body>
</html>
